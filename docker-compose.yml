services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    # Reads API keys / model config from .env (copy it from .env.example first).
    env_file: .env
    # Point the app at the compose Redis service, not localhost.
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
